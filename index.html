<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=192, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    /* This makes the whole browser background black */
    body, html { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background-color: #000; 
      display: flex;
      justify-content: flex-start; /* Aligns to top-left */
      align-items: flex-start;
      overflow: hidden; 
    }

    /* This container crops the Google banner */
    .crop-frame {
      width: 192px;
      height: 256px;
      overflow: hidden;
      position: relative;
      background: #000;
    }

    iframe {
      width: 192px;
      height: 315px; /* Taller to allow cropping */
      border: none;
      position: absolute;
      top: -55px; /* Adjust this if you see the gray banner */
      left: 0;
    }
  </style>
</head>
<body>
  <div class="crop-frame">
    <iframe src="https://script.google.com/macros/s/AKfycbxreCIBZlB0woWccbG_6zTHGaYLVPGHVidsZOscTGDfNJtKvD7rRjg8qIk-Q9woghE22w/exec"></iframe>
  </div>
</body>
</html>
