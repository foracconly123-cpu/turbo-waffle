<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Air Quality Monitor</title>
  <style>
    /* 1. Reset everything to black and zero out gaps */
    body, html { 
      margin: 0; 
      padding: 0; 
      background-color: #000; 
      overflow: hidden; 
    }

    /* 2. The 192x256 Box stuck to the top-left */
    .dashboard-box {
      width: 192px;
      height: 256px;
      overflow: hidden;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 3. The Iframe */
    iframe {
      width: 192px;
      height: 310px; /* Taller so the bottom isn't cut off */
      border: none;
      position: absolute;
      /* This shifts the content UP to hide the Google Banner 
         Change this to 0px if you WANT to see the banner */
      top: -55px; 
      left: 0;
    }
  </style>
</head>
<body>
  <div class="dashboard-box">
    <iframe src="PASTE_YOUR_URL_HERE"></iframe>
  </div>
</body>
</html>
