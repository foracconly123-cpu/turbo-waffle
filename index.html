<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Air Quality Dashboard</title>
  <style>
    /* 1. Set background to black and remove all browser spacing */
    body, html { 
      margin: 0; 
      padding: 0; 
      background-color: #000; 
      overflow: hidden; 
    }

    /* 2. A simple container fixed to the top-left */
    .container {
      width: 192px;
      height: 256px;
      overflow: hidden;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 3. The Iframe at its native size */
    iframe {
      width: 192px;
      height: 256px;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <iframe src="https://script.google.com/macros/s/AKfycbxreCIBZlB0woWccbG_6zTHGaYLVPGHVidsZOscTGDfNJtKvD7rRjg8qIk-Q9woghE22w/exec"></iframe>
  </div>
</body>
</html>
