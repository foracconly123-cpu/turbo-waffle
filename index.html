<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=192, initial-scale=1.0">
  <title>Air Quality Dashboard</title>
  <style>
    /* 1. Make the base page black and remove all spacing */
    body, html { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background-color: #000; 
      overflow: hidden; 
      display: block; /* Removes flex centering */
    }

    /* 2. Position the dashboard container at the absolute top-left */
    .crop-frame {
      width: 192px;
      height: 256px;
      overflow: hidden;
      position: absolute;
      top: 0;
      left: 0;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="crop-frame">
    <iframe src="https://script.google.com/macros/s/AKfycbxreCIBZlB0woWccbG_6zTHGaYLVPGHVidsZOscTGDfNJtKvD7rRjg8qIk-Q9woghE22w/exec"></iframe>
  </div>
</body>
</html>
